name: Linux Build (AppImage)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        run: flutter pub get

      - name: Run flutter analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Build Linux release
        run: flutter build linux --release

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir
          mkdir -p AppDir/the_blog.AppDir
          cp -r build/linux/x64/release/bundle/* AppDir/the_blog.AppDir/

      - name: Create AppRun
        run: |
          cat > AppDir/the_blog.AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "${0}")")"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export FLUTTER_LIBRARY="${HERE}/usr/lib/libflutter_linux_gtk.so"
          exec "${HERE}/usr/bin/the_blog" "$@"
          EOF
          chmod +x AppDir/the_blog.AppDir/AppRun

      - name: Create AppImage desktop file
        run: |
          cat > AppDir/the_blog.AppDir/the_blog.desktop << 'EOF'
          [Desktop Entry]
          Name=The Blog
          Exec=the_blog
          Icon=the_blog
          Type=Application
          Categories=Utility;
          EOF

      - name: Install appimagetool
        run: |
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ./appimagetool AppDir/the_blog.AppDir the_blog.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: the_blog.AppImage
          path: the_blog.AppImage

      - name: Upload bundle as tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: the_blog-linux-bundle
          path: build/linux/x64/release/bundle/
